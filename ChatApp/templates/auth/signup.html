{% extends 'auth/base.html' %} 
{% block title %}
<title>HackChat - 新規登録</title>
{% endblock %} 
{% block body %}
<div class="auth-wrapper">
  {% with messages = get_flashed_messages() %}
  {% if messages %}
  <ul class="auth-flashes">
    {% for message in messages %}
    <li>{{ message }}</li>
    {% endfor %}
  </ul>
  {% endif %}
  {% endwith %}
  <div class="auth-cards">
    <!-- 新規登録 -->
    <div class="auth-card">
      <div class="auth-card-header">
        <h1 class="auth-card-title">
          Create Account
        </h1>
      </div>
      <form class="auth-form" method="post" action="{{ url_for('signup_process') }}">
        <div class="auth-form-item">
          <input
            class="auth-form-input"
            type="text"
            name="name"
            id="signup-name"
            placeholder="ユーザー名"
          />
        </div>
        <div class="auth-form-item">
          <input
            class="auth-form-input"
            type="text"
            name="email"
            id="signup-email"
            placeholder="メールアドレス"
          />
        </div>
        <div class="auth-form-item">
          <input
            class="auth-form-input"
            type="password"
            name="password"
            id="signup-password"
            placeholder="パスワード"
          />
        </div>
        <div class="auth-form-item">
          <input
            class="auth-form-input"
            type="password"
            name="password-confirmation"
            id="signup-password-confirmation"
            placeholder="パスワード確認"
          />
        </div>
        <div class="auth-button-container">
          <button class="auth-button auth-button-gradient" type="submit">アカウント作成</button>
          <a class="switch-auth-mode" href="{{ url_for('login_view') }}">ログイン</a>
        </div>
      </form>
    </div>
  </div>
</div>
<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
{% endblock %}
